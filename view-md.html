<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>View Markdown</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin: 0; padding: 0; background: #f8fafc; color: #0f172a; }
    .container { max-width: 900px; margin: 40px auto; background: white; padding: 28px; border-radius: 8px; box-shadow: 0 6px 24px rgba(15,23,42,0.08); }
    .meta { margin-bottom: 18px; display:flex; gap:12px; align-items:center; }
    a.button { background:#2563eb; color:white; padding:8px 12px; border-radius:6px; text-decoration:none; font-weight:600 }
    pre { background:#0f172a; color:#e5e7eb; padding:12px; border-radius:6px; overflow:auto }
  </style>
</head>
<body>
  <div class="container">
    <div class="meta">
      <a href="index.html" class="button">← Back to Dashboard</a>
      <div id="info" style="margin-left:12px;color:#475569"></div>
      <div style="flex:1"></div>
      <a id="rawLink" class="button" style="background:#10b981;">Open Raw</a>
    </div>
    <div id="content">Loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
  <script>
    function getQueryParam(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }
    const file = getQueryParam('file');
    const infoEl = document.getElementById('info');
    const contentEl = document.getElementById('content');
    const rawLink = document.getElementById('rawLink');
    if(!file){
      contentEl.innerHTML = '<p style="color:#7f9bae">No file specified. Use ?file=path/to/file.md</p>'
    } else {
      infoEl.textContent = file;
      rawLink.href = file;
      rawLink.target = '_blank';
      fetch(file).then(r=>{
        if(!r.ok) throw new Error('Failed to fetch');
        return r.text();
      }).then(md=>{
        const html = marked.parse(md);
        contentEl.innerHTML = DOMPurify.sanitize(html);
      }).catch(err=>{
        contentEl.innerHTML = '<pre style="color:#ef4444">Error loading file: '+err.message+'</pre>';
      })
    }
  </script>
</body>
</html>
